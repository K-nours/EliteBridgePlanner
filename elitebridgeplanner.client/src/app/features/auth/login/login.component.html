<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-icon">⬡</div>
      <h1 class="title">BRIDGE PLANNER</h1>
      <p class="subtitle">ELITE DANGEROUS // COLONIZATION</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
      <div class="field-group">
        <label class="field-label">{{'AUTH.LOGIN.EMAIL' | translate}}</label>
        <input class="field-input" type="email" formControlName="email" placeholder="cmdr@example.com"
          autocomplete="email" />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
        <span class="field-error">{{'AUTH.LOGIN.INVALID_EMAIL' | translate}}</span>
        }
      </div>

      <div class="field-group">
        <label class="field-label">{{'AUTH.LOGIN.PASSWORD' | translate}}</label>
        <input class="field-input" type="password" formControlName="password" placeholder="••••••••"
          autocomplete="current-password" />
      </div>

      @if (error()) {
      <div class="error-banner">⚠ {{ error() }}</div>
      }

      <button type="submit" class="btn btn-primary" [disabled]="form.invalid || isLoading()">
        {{ (isLoading() ? 'AUTH.LOGIN.CONNECTING' : 'AUTH.LOGIN.CONNECTION') | translate }}
      </button>
    </form>

    <div class="login-footer">
      <span class="text-dim">{{'AUTH.LOGIN.NO_REGISTER' | translate}}</span>
      <a routerLink="/register" class="link">{{'AUTH.LOGIN.REGISTER' | translate}}</a>
    </div>
  </div>
</div>
