<div class="viz-container">
    <div class="viz-title">▸ {{'BRIDGE.MAP.TITLE' | translate }}</div>
    <div class="bridge-track">
        @for (system of store.orderedSystems(); track system.id; let i = $index) {
        @if (i > 0) {
        <div class="line-segment" [class.segment-green]="system.order <= lastOperationalOrder()"
            [class.segment-normal]="system.order > lastOperationalOrder()"></div>
        }
        <div [class]="'bridge-node type-' + system.type + (system.status === 'FINI' ? ' status-FINI' : '')"
            [class.selected]="store.selectedSystem()?.id === system.id" (click)="store.selectSystem(system)">
            <div [class]="'node-shape type-' + system.type + (system.status === 'FINI' ? ' status-FINI' : '')"></div>
            <div class="node-label" [truncateTooltip]="system.name" [truncateTooltipForce]="system.name.length > 14"
                [truncateTooltipAbove]="true">
                <span class="node-label-name">{{ system.name | truncateMiddle:14 }}</span>
                <span class="node-label-order">#{{ system.order }}</span>
            </div>
        </div>
        }
        @if (store.orderedSystems().length === 0) {
        <span class="empty-viz">{{'BRIDGE.MAP.EMPTY' | translate }}</span>
        }
    </div>
</div>
