version: '3.9'

# SQL Server dédié Guild Dashboard 501 — host 1434 → conteneur 1433.
# EliteBridgePlanner utilise le compose à la racine du dépôt (port 1433).
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: guild_dashboard_sqlserver
    restart: unless-stopped
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1434:1433"
    volumes:
      - guild_dashboard_sqldata:/var/opt/mssql
    healthcheck:
      # SQL Server 2022 : sqlcmd est sous mssql-tools18 (pas mssql-tools).
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong!Passw0rd -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  guild_dashboard_sqldata:
    name: 501_guilddashboard_sqldata
    driver: local
